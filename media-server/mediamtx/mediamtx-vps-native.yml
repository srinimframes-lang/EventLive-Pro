# MediaMTX native HLS on VPS (stable mobile playback).
# Deployed on the VPS as /opt/mediamtx.yml (PM2 process "mediamtx").
#
# Endpoints:
#   RTMP ingest : rtmp://stream.eventlivepro.com:1935/live/<eventId>
#   HLS playback: https://stream.eventlivepro.com/live/<eventId>/index.m3u8
#
# OBS recommended settings (must match HLS segment duration):
#   Encoder: x264 or NVENC H.264
#   Rate control: CBR
#   Bitrate: 2500–3500 kbps (1080p) or 1500–2500 kbps (720p)
#   Keyframe interval (GOP): 2 seconds
#   Audio: AAC 128–160 kbps
#
# HLS / WebRTC / API listen on localhost only. Nginx terminates TLS.

logLevel: info
logDestinations: [stdout]

api: yes
apiAddress: 127.0.0.1:9997

metrics: no
pprof: no
playback: no
rtsp: no
srt: no

rtmp: yes
rtmpAddress: :1935
rtmpEncryption: "no"

# Classic MPEG-TS HLS with sliding-window DVR (YouTube Live style).
# Keep LL-HLS off for mobile stability; DVR comes from a long segment window
# stored on disk (hlsDirectory) so RAM stays bounded. Recording/R2 is separate
# and still runs only after the stream ends.
#
# With OBS keyframe interval = 2s, each segment is ~2s. 1800 segments ≈ 60 min
# of rewind while the live is still running.
hls: yes
hlsAddress: 127.0.0.1:8888
hlsAllowOrigin: '*'
hlsAlwaysRemux: yes
hlsVariant: mpegts
hlsSegmentCount: 1800
hlsSegmentDuration: 2s
hlsSegmentMaxSize: 50M
hlsDirectory: /root/EventLive-Pro/hls-cache
hlsMuxerCloseAfter: 30s

webrtc: yes
webrtcAddress: 127.0.0.1:8889
webrtcAllowOrigin: '*'
webrtcLocalUDPAddress: :8189
webrtcIPsFromInterfaces: no
webrtcAdditionalHosts: [stream.eventlivepro.com]

# Replace MEDIA_SERVER_SECRET with server/.env MEDIA_SERVER_SECRET.
authMethod: http
authHTTPAddress: http://127.0.0.1:5000/api/events/stream/mediamtx-auth?token=MEDIA_SERVER_SECRET
authHTTPExclude:
  - action: read
  - action: playback
  - action: api
  - action: metrics
  - action: pprof

# Automatic recording: starts when OBS publishes, stops when the stream ends.
# Native format is fMP4 (.mp4); finalize-recording.sh remuxes to standard MP4
# under recordings/<eventId>/ after the stream ends (never during live).
readTimeout: 60s
writeTimeout: 30s

pathDefaults:
  record: yes
  recordPath: /root/EventLive-Pro/recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 24h
  recordDeleteAfter: 0s
  runOnReady: /root/EventLive-Pro/media-server/scripts/on-publish-notify.sh
  runOnNotReady: /root/EventLive-Pro/media-server/scripts/on-unpublish-notify.sh
  runOnReadyRestart: no
  runOnRecordSegmentComplete: /root/EventLive-Pro/media-server/scripts/finalize-recording.sh

paths:
  all_others:
    source: publisher
