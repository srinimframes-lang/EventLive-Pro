# EventLive Pro — MediaMTX HTTPS front door
# Install:
#   sudo cp media-server/nginx/stream.eventlivepro.com.conf \
#     /etc/nginx/sites-available/stream.eventlivepro.com
#   sudo ln -sf /etc/nginx/sites-available/stream.eventlivepro.com \
#     /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# OBS  → rtmp://stream.eventlivepro.com:1935/live  + stream key <id>
# Site → https://stream.eventlivepro.com/live/<id>/index.m3u8 (this vhost → :8888)
#
# Compatibility: if OBS accidentally publishes to live/<id>/<id> (Server URL
# already included the key), canonical /live/<id>/* falls back to that path.

# Reject bare-IP / unknown Host access to streaming ports via HTTP(S).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 444;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name stream.eventlivepro.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stream.eventlivepro.com;

    ssl_certificate     /etc/letsencrypt/live/stream.eventlivepro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.eventlivepro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Only the main EventLive origins may embed / fetch HLS from this host.
    set $cors_origin "";
    if ($http_origin ~* ^https://(www\.)?eventlivepro.com$) {
        set $cors_origin $http_origin;
    }

    # WebRTC WHEP/WHIP → MediaMTX :8889
    location ~ ^/live/[^/]+/(whep|whip)$ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Cache-Control "no-store" always;
    }

    # Canonical HLS path, with fallback when OBS published live/<id>/<id>.
    location ~ "^/live/([0-9a-fA-F]{24})/(.*)$" {
        set $eid $1;
        set $rest $2;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Never gzip playlists/segments — breaks some mobile HLS clients mid-stream.
        gzip off;
        proxy_pass http://127.0.0.1:8888/live/$eid/$rest$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_intercept_errors on;
        error_page 404 = @hls_obs_double_key;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Cache-Control;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        # Playlists must stay fresh; segments are immutable for their lifetime.
        add_header Cache-Control "no-cache" always;
    }

    location @hls_obs_double_key {
        gzip off;
        proxy_pass http://127.0.0.1:8888/live/$eid/$eid/$rest$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Cache-Control;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Cache-Control "no-cache" always;
    }

    # Non-event HLS / other MediaMTX routes
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        gzip off;
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Cache-Control;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Cache-Control "no-cache" always;
    }
}

# Catch-all HTTPS on the VPS IP / unknown names — do not expose streams.
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/stream.eventlivepro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.eventlivepro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 444;
}
