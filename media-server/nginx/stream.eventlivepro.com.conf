# Nginx reverse proxy: MediaMTX HLS → https://stream.eventlivepro.com
#
# DNS: stream.eventlivepro.com  A  →  200.97.166.42
#
# MediaMTX must keep serving HLS on 127.0.0.1:8888 (do not change MediaMTX).
#
# Install (on the VPS):
#   sudo apt update && sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo cp media-server/nginx/stream.eventlivepro.com.conf \
#     /etc/nginx/sites-available/stream.eventlivepro.com
#   sudo ln -sf /etc/nginx/sites-available/stream.eventlivepro.com \
#     /etc/nginx/sites-enabled/stream.eventlivepro.com
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d stream.eventlivepro.com --non-interactive --agree-tos \
#     -m admin@eventlivepro.com --redirect
#
# Verify:
#   curl -I https://stream.eventlivepro.com/live/test/index.m3u8

# Map allowed browser origins for CORS (watch pages on eventlivepro.com).
map $http_origin $hls_cors_origin {
    default "";
    "https://eventlivepro.com"      $http_origin;
    "https://www.eventlivepro.com"  $http_origin;
}

upstream mediamtx_hls {
    server 127.0.0.1:8888;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name stream.eventlivepro.com;

    # Certbot will add ACME + HTTPS redirect here after first run.
    location / {
        proxy_pass http://mediamtx_hls;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # CORS for HLS.js on the main site
        add_header Access-Control-Allow-Origin $hls_cors_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        add_header Cache-Control "no-store" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $hls_cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Origin, Accept, Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
}

